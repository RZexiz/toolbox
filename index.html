<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f14;color:#e0e0e8;display:flex;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#16161e;}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:3px;}
.sidebar{width:260px;min-width:260px;background:#16161e;border-right:1px solid #2a2a3a;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;transition:transform .3s;}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid #2a2a3a;}
.sidebar-header h1{font-size:22px;font-weight:700;color:#7c6aef;display:flex;align-items:center;gap:10px;}
.sidebar-header h1 span{color:#4ade80;}
.sidebar-header p{font-size:11px;color:#666;margin-top:4px;}
.nav{flex:1;overflow-y:auto;padding:12px 0;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;color:#888;font-size:14px;transition:all .2s;border-left:3px solid transparent;}
.nav-item:hover{background:#1a1a25;color:#e0e0e8;}
.nav-item.active{background:#1a1a25;color:#7c6aef;border-left-color:#7c6aef;font-weight:600;}
.nav-item .icon{width:20px;text-align:center;font-size:16px;}
.main{margin-left:260px;flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{padding:16px 32px;border-bottom:1px solid #2a2a3a;background:#16161e;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar h2{font-size:18px;font-weight:600;color:#e0e0e8;}
.hamburger{display:none;background:none;border:none;color:#e0e0e8;font-size:24px;cursor:pointer;padding:4px 8px;}
#content{padding:24px 32px;flex:1;}
.card{background:#1a1a25;border:1px solid #2a2a3a;border-radius:12px;padding:24px;margin-bottom:20px;}
.card-title{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;background:#0f0f14;color:#888;border:1px solid #2a2a3a;transition:all .2s;}
.tab:hover{color:#e0e0e8;border-color:#7c6aef;}
.tab.active{background:#7c6aef;color:#fff;border-color:#7c6aef;}
.row{display:flex;gap:16px;align-items:end;flex-wrap:wrap;margin-bottom:16px;}
.field{flex:1;min-width:120px;}
.field label{display:block;font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.field select,.field input{width:100%;padding:10px 12px;background:#0f0f14;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e8;font-size:14px;outline:none;transition:border-color .2s;}
.field select:focus,.field input:focus{border-color:#7c6aef;}
.field select option{background:#16161e;color:#e0e0e8;}
.swap-btn{padding:10px 16px;background:#2a2a3a;border:none;border-radius:8px;color:#7c6aef;cursor:pointer;font-size:18px;transition:all .2s;margin-bottom:0;}
.swap-btn:hover{background:#7c6aef;color:#fff;}
.result-banner{background:linear-gradient(135deg,#7c6aef22,#4ade8022);border:1px solid #7c6aef44;border-radius:12px;padding:20px 24px;margin-top:16px;text-align:center;}
.result-banner .value{font-size:28px;font-weight:700;color:#4ade80;}
.result-banner .label{font-size:12px;color:#888;margin-top:4px;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px;}
.info-item{background:#0f0f14;border-radius:8px;padding:14px;border:1px solid #2a2a3a;}
.info-item .il{font-size:11px;color:#888;text-transform:uppercase;}
.info-item .iv{font-size:18px;font-weight:600;color:#e0e0e8;margin-top:4px;}
.clock-bar{background:#0f0f14;border:1px solid #2a2a3a;border-radius:8px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.clock-time{font-size:20px;font-weight:700;color:#4ade80;font-family:monospace;}
.toggle{display:flex;gap:4px;background:#1a1a25;border-radius:6px;padding:2px;}
.toggle button{padding:4px 12px;border:none;border-radius:4px;cursor:pointer;font-size:12px;background:transparent;color:#888;transition:all .2s;}
.toggle button.active{background:#7c6aef;color:#fff;}
.tz-panels{display:flex;gap:20px;flex-wrap:wrap;}
.tz-panel{flex:1;min-width:280px;background:#0f0f14;border:1px solid #2a2a3a;border-radius:12px;padding:20px;}
.tz-panel .big-time{font-size:36px;font-weight:700;text-align:center;margin:16px 0;font-family:monospace;color:#e0e0e8;}
.tz-panel .big-date{text-align:center;font-size:13px;color:#888;margin-bottom:12px;}
.diff-badge{text-align:center;padding:12px;font-size:14px;color:#7c6aef;background:#7c6aef11;border-radius:8px;margin-top:16px;border:1px solid #7c6aef33;}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:90;}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);}
.sidebar.open{transform:translateX(0);}
.hamburger{display:block;}
.main{margin-left:0;}
#content{padding:16px;}
.topbar{padding:12px 16px;}
.overlay.show{display:block;}
}
.dl-input-wrap{display:flex;gap:8px;margin-bottom:20px;}
.dl-input-wrap input{flex:1;padding:14px 16px;background:#0f0f14;border:2px solid #2a2a3a;border-radius:12px;color:#e0e0e8;font-size:15px;outline:none;transition:border-color .3s;}
.dl-input-wrap input:focus{border-color:#7c6aef;}
.dl-go{padding:14px 28px;background:linear-gradient(135deg,#7c6aef,#4ade80);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:transform .2s,box-shadow .2s;white-space:nowrap;}
.dl-go:hover{transform:translateY(-1px);box-shadow:0 4px 20px #7c6aef44;}
.dl-go:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.dl-loading{text-align:center;padding:40px;color:#888;}
.dl-loading .spinner{display:inline-block;width:40px;height:40px;border:3px solid #2a2a3a;border-top-color:#7c6aef;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.dl-result{background:#1a1a25;border:1px solid #2a2a3a;border-radius:12px;padding:20px;margin-top:16px;}
.dl-meta{display:flex;gap:16px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.dl-meta img{width:80px;height:80px;border-radius:12px;object-fit:cover;border:2px solid #2a2a3a;}
.dl-meta-text{flex:1;min-width:200px;}
.dl-meta-text .dl-title{font-size:15px;font-weight:600;color:#e0e0e8;line-height:1.4;}
.dl-meta-text .dl-author{font-size:12px;color:#7c6aef;margin-top:4px;}
.dl-platform-badge{display:inline-block;padding:2px 10px;background:#7c6aef22;color:#7c6aef;border-radius:20px;font-size:11px;font-weight:600;margin-top:8px;}
.dl-links{display:flex;flex-direction:column;gap:8px;}
.dl-links a{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#0f0f14;border:1px solid #2a2a3a;border-radius:10px;color:#e0e0e8;text-decoration:none;font-size:14px;transition:all .2s;}
.dl-links a:hover{border-color:#7c6aef;background:#7c6aef11;transform:translateX(4px);}
.dl-links a .dl-q{color:#4ade80;font-weight:600;}
.dl-links a .dl-t{font-size:12px;color:#888;text-transform:uppercase;}
.dl-error{text-align:center;padding:24px;color:#ef4444;background:#ef444411;border:1px solid #ef444433;border-radius:12px;margin-top:16px;font-size:14px;}
.dl-platforms{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.dl-platform-btn{padding:8px 16px;border-radius:20px;border:1px solid #2a2a3a;background:#0f0f14;color:#888;font-size:12px;cursor:pointer;transition:all .2s;}
.dl-platform-btn.active{border-color:#7c6aef;color:#7c6aef;background:#7c6aef11;}
.dl-platform-btn:hover{border-color:#7c6aef;color:#e0e0e8;}
.nav-group{margin-bottom:4px;}
.nav-group-header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;cursor:pointer;color:#666;font-size:12px;text-transform:uppercase;letter-spacing:1px;font-weight:600;transition:color .2s;user-select:none;}

.nav-group-header .arrow{font-size:10px;transition:transform .2s;}
.nav-group-header.open .arrow{transform:rotate(90deg);}
.nav-group-items{overflow:hidden;transition:max-height .3s ease;}
.nav-group-items.collapsed{max-height:0!important;}
.sidebar-footer{text-align:center;padding:16px;font-size:11px;color:#555;border-top:1px solid #1a1a25;margin-top:8px;}
.sidebar-footer strong{color:#7c6aef;}
.home-section{margin-bottom:32px;}
.home-section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#555;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #1a1a25;}

.home-card:hover{border-color:#7c6aef;transform:translateY(-2px);box-shadow:0 8px 24px #7c6aef15;}
.home-card-icon{font-size:26px;margin-bottom:6px;}
.home-card-name{font-size:11px;font-weight:600;color:#e0e0e8;line-height:1.3;}
.home-card-desc{display:none;}
</style>

Tools.timezone = {
  mode:'24H',fromIdx:20,toIdx:10,interval:null,inputTime:null,
  render(){
    clearInterval(this.interval);
    let h=`<div class="card"><div class="clock-bar"><div class="clock-time" id="tz-clock"></div>
      <div class="toggle"><button class="${this.mode==='24H'?'active':''}" onclick="Tools.timezone.setMode('24H')">24H</button><button class="${this.mode==='12H'?'active':''}" onclick="Tools.timezone.setMode('12H')">12H</button></div></div>

          <select id="tz-from" onchange="Tools.timezone.update()" style="width:100%;padding:8px;background:#0f0f14;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e8;margin-bottom:12px">
          ${TZ_LIST.map((z,i)=>`<option value="${i}" ${i===this.fromIdx?'selected':''}>${z.label}</option>`).join('')}</select>
          <div class="big-date" id="tz-from-date"></div><div class="big-time" id="tz-from-time"></div></div>
        <div class="tz-panel"><div style="font-size:12px;color:#4ade80;font-weight:600;margin-bottom:8px">TO</div>
          <select id="tz-to" onchange="Tools.timezone.update()" style="width:100%;padding:8px;background:#0f0f14;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e8;margin-bottom:12px">
          ${TZ_LIST.map((z,i)=>`<option value="${i}" ${i===this.toIdx?'selected':''}>${z.label}</option>`).join('')}</select>
          <div class="big-date" id="tz-to-date"></div><div class="big-time" id="tz-to-time"></div></div>
      </div>
      <div class="diff-badge" id="tz-diff"></div></div>`;
    document.getElementById('content').innerHTML=h;
    this.update();
    this.interval=setInterval(()=>this.update(),1000);
  },
  setMode(m){this.mode=m;this.render();},
  setInput(v){this.inputTime=v;this.update();},
  fmtTime(d){
    let h=d.getUTCHours(),m=d.getUTCMinutes(),s=d.getUTCSeconds();
    if(this.mode==='12H'){
      const ap=h>=12?'PM':'AM';h=h%12||12;
      return`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ap}`;
    }
    return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },
  update(){
    const now=new Date();
    let base;
    if(this.inputTime){
      const[hh,mm,ss]=this.inputTime.split(':').map(Number);
      base=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),hh,mm,ss||0));
      base.setUTCHours(base.getUTCHours()-TZ_LIST[this.fromIdx].off/60);
    } else {
      base=new Date(now.getTime()-now.getTimezoneOffset()*60000);
    }
    const fromOff=TZ_LIST[this.fromIdx].off*60000;
    const toOff=TZ_LIST[this.toIdx].off*60000;
    const fromD=new Date(base.getTime()+fromOff+now.getTimezoneOffset()*60000);
    const toD=new Date(base.getTime()+toOff+now.getTimezoneOffset()*60000);
    const opts={weekday:'short',year:'numeric',month:'short',day:'numeric'};
    document.getElementById('tz-clock').textContent=`⏰ ${this.fmtTime(now.toISOString?new Date():new Date())}`;
    document.getElementById('tz-from-date').textContent=fromD.toLocaleDateString('en-US',opts);
    document.getElementById('tz-from-time').textContent=this.fmtTime(fromD);
    document.getElementById('tz-to-date').textContent=toD.toLocaleDateString('en-US',opts);
    document.getElementById('tz-to-time').textContent=this.fmtTime(toD);
    const diff=(TZ_LIST[this.toIdx].off-TZ_LIST[this.fromIdx].off)/60;
    const sign=diff>=0?'+':'';
    document.getElementById('tz-diff').innerHTML=`Time difference: <strong>${sign}${diff} hour${diff!==1?'s':''}</strong> | ${TZ_LIST[this.fromIdx].label} → ${TZ_LIST[this.toIdx].label}`;
  }
};

Tools.coord = {
  tab:'utm2ll',
  render(){
    let h=`<div class="card"><div class="tabs">
      <div class="tab ${this.tab==='utm2ll'?'active':''}" onclick="Tools.coord.setTab('utm2ll')">UTM → Lat/Long</div>
      <div class="tab ${this.tab==='ll2utm'?'active':''}" onclick="Tools.coord.setTab('ll2utm')">Lat/Long → UTM</div></div>`;
    if(this.tab==='utm2ll'){
      h+=`<div class="row">
        <div class="field"><label>Zone (1-60)</label><select id="cz-zone">${Array.from({length:60},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select></div>
        <div class="field"><label>Hemisphere</label><select id="cz-hemi"><option value="N">North</option><option value="S">South</option></select></div>
        <div class="field"><label>Easting (m)</label><input type="number" id="cz-east" value="500000" step="any"></div>
        <div class="field"><label>Northing (m)</label><input type="number" id="cz-north" value="0" step="any"></div>
        <button class="swap-btn" onclick="Tools.coord.utm2ll()">→</button>
      </div></div><div class="result-banner" id="cz-result"></div>`;
    } else {
      h+=`<div class="row">
        <div class="field"><label>Latitude (°)</label><input type="number" id="cl-lat" value="0" step="any"></div>
        <div class="field"><label>Longitude (°)</label><input type="number" id="cl-lon" value="106" step="any"></div>
        <button class="swap-btn" onclick="Tools.coord.ll2utm()">→</button>
      </div></div><div class="result-banner" id="cl-result"></div>`;
    }
    document.getElementById('content').innerHTML=h;
  },
  setTab(t){this.tab=t;this.render();},
  utm2ll(){
    const zone=+document.getElementById('cz-zone').value;
    const hemi=document.getElementById('cz-hemi').value;
    const E=+document.getElementById('cz-east').value;
    const N=+document.getElementById('cz-north').value;
    const a=6378137,f=1/298.257223563,b=a*(1-f),e2=2*f-f*f,e2p=e2/(1-e2),k0=0.9996;
    const ep2=e2p;
    const M0=hemi==='N'?0:10000000;
    const M=M0+(hemi==='N'?N:-N);
    const mu=M/(a*k0);
    const e1=(1-Math.sqrt(1-e2))/(1+Math.sqrt(1-e2));
    const phi1=mu+e1*(3/2-27/32*e1*e1)*Math.sin(2*mu)+e1*e1*(21/16-55/32*e1*e1)*Math.sin(4*mu)+e1*e1*e1*(151/96)*Math.sin(6*mu);
    const N1=a/Math.sqrt(1-e2*Math.sin(phi1)*Math.sin(phi1));
    const T1=Math.tan(phi1)*Math.tan(phi1);
    const C1=ep2*Math.cos(phi1)*Math.cos(phi1);
    const R1=a*(1-e2)/Math.pow(1-e2*Math.sin(phi1)*Math.sin(phi1),1.5);
    const D=(E-500000)/(N1*k0);
    const lat=phi1-(N1*Math.tan(phi1)/R1)*(D*D/2-(5+3*T1+10*C1-4*ep2)*D*D*D*D/24+(61+90*T1+298*C1+45*T1*T1)*D*D*D*D*D*D/720);
    const lon=(zone*6-183)*Math.PI/180+(D-(1+2*T1+C1)*D*D*D/6+(5-2*C1+28*T1-3*ep2+8*C1*C1+24*T1*T1)*D*D*D*D*D/120)/Math.cos(phi1);
    const latD=lat*180/Math.PI,lonD=lon*180/Math.PI;
    document.getElementById('cz-result').innerHTML=`<div class="value">${latD.toFixed(6)}° ${hemi}, ${lonD.toFixed(6)}°</div><div class="label">UTM Zone ${zone}${hemi} (${E}, ${N}) → Latitude, Longitude</div>`;
  },
  ll2utm(){
    const lat=+document.getElementById('cl-lat').value*Math.PI/180;
    const lon=+document.getElementById('cl-lon').value*Math.PI/180;
    const a=6378137,f=1/298.257223563,b=a*(1-f),e2=2*f-f*f,k0=0.9996;
    const zone=Math.floor((+document.getElementById('cl-lon').value+180)/6)+1;
    const lon0=(zone*6-183)*Math.PI/180;
    const ep2=e2/(1-e2);
    const N=a/Math.sqrt(1-e2*Math.sin(lat)*Math.sin(lat));
    const T=Math.tan(lat)*Math.tan(lat);
    const C=ep2*Math.cos(lat)*Math.cos(lat);
    const A=(lon-lon0)*Math.cos(lat);
    const M=a*((1-e2/4-3*e2*e2/64)*lat-(3*e2/8+3*e2*e2/32)*Math.sin(2*lat)+(15*e2*e2/256)*Math.sin(4*lat));

Tools.concvol={shape:'rect',render(){var inputs='';if(this.shape==='rect')inputs='<div class="field"><label>L (m)</label><input type="number" id="cv-l" value="1" step="any" oninput="Tools.concvol.calc()"></div><div class="field"><label>W (m)</label><input type="number" id="cv-w" value="1" step="any" oninput="Tools.concvol.calc()"></div><div class="field"><label>H (m)</label><input type="number" id="cv-h" value="1" step="any" oninput="Tools.concvol.calc()"></div>';else if(this.shape==='circ')inputs='<div class="field"><label>R (m)</label><input type="number" id="cv-r" value="1" step="any" oninput="Tools.concvol.calc()"></div><div class="field"><label>H (m)</label><input type="number" id="cv-h" value="1" step="any" oninput="Tools.concvol.calc()"></div>';else inputs='<div class="field"><label>A (m)</label><input type="number" id="cv-a" value="1" step="any" oninput="Tools.concvol.calc()"></div><div class="field"><label>B (m)</label><input type="number" id="cv-b" value="2" step="any" oninput="Tools.concvol.calc()"></div><div class="field"><label>H (m)</label><input type="number" id="cv-h" value="1" step="any" oninput="Tools.concvol.calc()"></div><div class="field"><label>L (m)</label><input type="number" id="cv-l" value="3" step="any" oninput="Tools.concvol.calc()"></div>';return '<div class="card"><div class="card-title">Concrete Volume by Shape</div><div class="tabs"><div class="tab '+(this.shape==='rect'?'active':'')+'" onclick="Tools.concvol.shape="rect";Tools.concvol.render()">Rect</div><div class="tab '+(this.shape==='circ'?'active':'')+'" onclick="Tools.concvol.shape="circ";Tools.concvol.render()">Circle</div><div class="tab '+(this.shape==='trap'?'active':'')+'" onclick="Tools.concvol.shape="trap";Tools.concvol.render()">Trap</div></div><div class="row">'+inputs+'</div></div><div id="cv-result"></div>';},calc(){var vol=0;if(this.shape==='rect')vol=(+document.getElementById('cv-l').value||0)*(+document.getElementById('cv-w').value||0)*(+document.getElementById('cv Tools.retwall={render(){return '<div class="card"><div class="card-title">Retaining Wall - Earth Pressure</div><div class="row"><div class="field"><label>Height (m)</label><input type="number" id="rw-h" value="3" step="any" oninput="Tools.retwall.calc()"></div><div class="field"><label>gamma (kN/m3)</label><input type="number" id="rw-g" value="18" step="any" oninput="Tools.retwall.calc()"></div><div class="field"><label>phi (deg)</label><input type="number" id="rw-phi" value="30" step="any" oninput="Tools.retwall.calc()"></div><div class="field"><label>Surcharge (kPa)</label><input type="number" id="rw-q" value="10" step="any" oninput="Tools.retwall.calc()"></div></div></div><div id="rw-result"></div>';},calc(){var h=+document.getElementById('rw-h').value||0,g=+document.getElementById('rw-g').value||0,phi=+document.getElementById('rw-phi').value||0,q=+document.getElementById('rw-q').value||0;var Ka=Math.pow(Math.tan((45-phi/2)*Math.PI/180),2);var Pa=0.5*Ka*g*h*h+Ka*q*h;var Mo=Pa*h/3;var Kp=Math.pow(Math.tan((45+phi/2)*Math.PI/180),2);document.getElementById('rw-result').innerHTML='<div class="info-grid"><div class="info-item"><div class="il">Active Ka</div><div class="iv">'+Ka.toFixed(4)+'</div></div><div class="info-item"><div class="il">Pa</div><div class="iv">'+Pa.toFixed(1)+' kN/m</div></div><div class="info-item"><div class="il">Moment</div><div class="iv">'+Mo.toFixed(1)+' kN.m/m</div></div><div class="info-item"><div class="il">Passive Kp</div><div class="iv">'+Kp.toFixed(4)+'</div></div><div class="info-item"><div class="il">Base Pressure</div><div class="iv">'+(Ka*g*h+Ka*q).toFixed(1)+' kPa</div></div></div>';}};

const DL_API = 'https://api.romanzx.dev'; // Backend proxy — deployed on VPS with HTTPS
const DL_PLATFORMS = {
  tiktok:{name:'TikTok',icon:'\u{1f3ac}',patterns:[/tiktok\.com|vm\.tiktok\.com/i]},
  instagram:{name:'Instagram',icon:'\u{1f4f7}',patterns:[/instagram\.com/i]},
  youtube:{name:'YouTube',icon:'\u{1f3a5}',patterns:[/youtube\.com|youtu\.be/i]},
  twitter:{name:'Twitter/X',icon:'\u{1f426}',patterns:[/twitter\.com|x\.com/i]},
  threads:{name:'Threads',icon:'\u{1f9f5}',patterns:[/threads\.net/i]}
};
function detectPlatform(u){for(var k in DL_PLATFORMS){if(DL_PLATFORMS[k].patterns.some(function(p){return p.test(u)}))return k;}return null;}
function dlRenderMeta(d){
  var h='<div class="dl-meta">';
  if(d.thumbnail)h+='<img src="'+d.thumbnail+'" onerror="this.style.display=\'none\'">';
  h+='<div class="dl-meta-text">';
  h+='<div class="dl-title">'+(d.title||'').substring(0,200)+'</div>';
  if(d.author)h+='<div class="dl-author">@'+d.author+'</div>';
  h+='<div class="dl-platform-badge">'+(d.platform||'Unknown')+'</div>';
  h+='</div></div>';
  return h;
}
function dlRenderLinks(results){
  if(!results||results.length===0)return'<div class="dl-error">No download links found</div>';
  var h='<div class="dl-links">';
  results.forEach(function(r){
    h+='<a href="'+r.url+'" target="_blank" rel="noopener"><span class="dl-t">'+r.quality+'</span><span class="dl-q">Download \u2192</span></a>';
  });
  h+='</div>';
  return h;
}

Tools.dluniversal={platform:'',render(){
  var pbs='';for(var k in DL_PLATFORMS){pbs+='<div class="dl-platform-btn '+(k===this.platform?'active':'')+'" onclick="Tools.dluniversal.setPlatform(\''+k+'\')">'+DL_PLATFORMS[k].icon+' '+DL_PLATFORMS[k].name+'</div>';}
  return '<div class="card"><div class="card-title">\u{1f517} Social Media Downloader</div><div class="dl-platforms">'+pbs+'</div><div class="dl-input-wrap"><input type="text" id="dl-url" placeholder="Paste link here (auto-detect platform)..." onkeydown="if(event.keyCode===13)Tools.dluniversal.go()"><button class="dl-go" onclick="Tools.dluniversal.go()">\u{2b07} Download</button></div><div id="dl-output"></div></div>';
},setPlatform(p){this.platform=p;document.getElementById('dl-url').focus();},
async go(){
  var url=(document.getElementById('dl-url').value||'').trim();
  if(!url){document.getElementById('dl-output').innerHTML='<div class="dl-error">Paste a URL first!</div>';return;}
  var plat=this.platform||detectPlatform(url);
  if(!plat){document.getElementById('dl-output').innerHTML='<div class="dl-error">Cannot detect platform. Click one of the platform buttons above first.</div>';return;}
  if(!DL_API){document.getElementById('dl-output').innerHTML='<div class="dl-error">\u{26a0}\ufe0f Backend not configured. Contact admin.</div>';return;}
  document.getElementById('dl-output').innerHTML='<div class="dl-loading"><div class="spinner"></div><p style="margin-top:12px">Fetching from '+DL_PLATFORMS[plat].name+'...</p></div>';
  try{
    var res=await fetch(DL_API+'/api/download?url='+encodeURIComponent(url)+'&platform='+plat);
    var data=await res.json();
    if(data.error){document.getElementById('dl-output').innerHTML='<div class="dl-error">\u{26a0}\ufe0f '+data.error+'</div>';return;}
    document.getElementById('dl-output').innerHTML='<div class="dl-result">'+dlRenderMeta(data)+dlRenderLinks(data.results)+'</div>';
  }catch(e){document.getElementById('dl-output').innerHTML='<div class="dl-error">\u{26a0}\ufe0f Error: '+e.message+'</div>';}
}};

const TOOL_LIST=TOOL_GROUPS.flatMap(g=>g.tools);
let currentTool='home';

function renderHome(){
  var h='<div style="padding:8px 0">';
  TOOL_GROUPS.forEach(function(g){
    h+='<div class="home-section"><div class="home-section-title">'+g.icon+' '+g.name+'</div><div class="home-grid">';
    g.tools.forEach(function(t){
      h+='<div class="home-card" onclick="switchTool(\''+t.key+'\')" title="'+t.desc+'"><div class="home-card-icon">'+t.icon+'</div><div class="home-card-name">'+t.name+'</div></div>';
    });
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}
function renderTool(){
  document.getElementById('content').innerHTML='';
  if(currentTool==='home'){
    document.getElementById('content').innerHTML=renderHome();
    document.getElementById('pageTitle').textContent='ToolBox';
    document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
    return;
  }
  var r=Tools[currentTool].render();
  if(typeof r==='string')document.getElementById('content').innerHTML=r;
}
function switchTool(key){
  currentTool=key;
  document.getElementById('pageTitle').textContent=TOOL_LIST.find(t=>t.key===key).name;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.key===key));
  renderTool();
  if(window.innerWidth<=768)toggleSidebar();
}
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function initNav(){
  var collapsed=JSON.parse(localStorage.getItem('navGroups')||'{}');
  document.getElementById('nav').innerHTML=TOOL_GROUPS.map(g=>{
    var isOpen=collapsed[g.id]===undefined?false:!!collapsed[g.id];
    return '<div class="nav-group" data-group="'+g.id+'">'+
      '<div class="nav-group-header '+(isOpen?'open':'')+'" onclick="toggleGroup(\''+g.id+'\')">'+
        '<span>'+g.icon+' '+g.name+'</span><span class="arrow">\u25b6</span>'+
      '</div>'+
      '<div class="nav-group-items'+(isOpen?'':' collapsed')+'" style="max-height:'+(isOpen?'500px':'0')+'">'+
        g.tools.map(t=>'<div class="nav-item" data-key="'+t.key+'" onclick="switchTool(\''+t.key+'\')"><span class="icon">'+t.icon+'</span>'+t.name+'</div>').join('')+
      '</div></div>';
  }).join('');
}
function toggleGroup(id){
  var group=document.querySelector('.nav-group[data-group="'+id+'"]');
  var header=group.querySelector('.nav-group-header');
  var items=group.querySelector('.nav-group-items');
  var isOpen=header.classList.contains('open');
  header.classList.toggle('open');
  items.classList.toggle('collapsed');
  items.style.maxHeight=isOpen?'0':'500px';
  var collapsed=JSON.parse(localStorage.getItem('navGroups')||'{}');
  collapsed[id]=isOpen;
  localStorage.setItem('navGroups',JSON.stringify(collapsed));
}
function switchTool(key){
  currentTool=key;
  document.getElementById('pageTitle').textContent=TOOL_LIST.find(t=>t.key===key).name;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.key===key));
  renderTool();
  if(window.innerWidth<=768)toggleSidebar();
}
initNav();renderTool();if(Tools[currentTool].calc)Tools[currentTool].calc();
