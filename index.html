<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolBox - Oil & Gas Drafter Tools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f14;color:#e0e0e8;display:flex;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:#16161e;}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:3px;}
.sidebar{width:260px;min-width:260px;background:#16161e;border-right:1px solid #2a2a3a;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;transition:transform .3s;}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid #2a2a3a;}
.sidebar-header h1{font-size:22px;font-weight:700;color:#7c6aef;display:flex;align-items:center;gap:10px;}
.sidebar-header h1 span{color:#4ade80;}
.sidebar-header p{font-size:11px;color:#666;margin-top:4px;}
.nav{flex:1;overflow-y:auto;padding:12px 0;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;color:#888;font-size:14px;transition:all .2s;border-left:3px solid transparent;}
.nav-item:hover{background:#1a1a25;color:#e0e0e8;}
.nav-item.active{background:#1a1a25;color:#7c6aef;border-left-color:#7c6aef;font-weight:600;}
.nav-item .icon{width:20px;text-align:center;font-size:16px;}
.main{margin-left:260px;flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{padding:16px 32px;border-bottom:1px solid #2a2a3a;background:#16161e;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar h2{font-size:18px;font-weight:600;color:#e0e0e8;}
.hamburger{display:none;background:none;border:none;color:#e0e0e8;font-size:24px;cursor:pointer;padding:4px 8px;}
#content{padding:24px 32px;flex:1;}
.card{background:#1a1a25;border:1px solid #2a2a3a;border-radius:12px;padding:24px;margin-bottom:20px;}
.card-title{font-size:14px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;background:#0f0f14;color:#888;border:1px solid #2a2a3a;transition:all .2s;}
.tab:hover{color:#e0e0e8;border-color:#7c6aef;}
.tab.active{background:#7c6aef;color:#fff;border-color:#7c6aef;}
.row{display:flex;gap:16px;align-items:end;flex-wrap:wrap;margin-bottom:16px;}
.field{flex:1;min-width:120px;}
.field label{display:block;font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.field select,.field input{width:100%;padding:10px 12px;background:#0f0f14;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e8;font-size:14px;outline:none;transition:border-color .2s;}
.field select:focus,.field input:focus{border-color:#7c6aef;}
.field select option{background:#16161e;color:#e0e0e8;}
.swap-btn{padding:10px 16px;background:#2a2a3a;border:none;border-radius:8px;color:#7c6aef;cursor:pointer;font-size:18px;transition:all .2s;margin-bottom:0;}
.swap-btn:hover{background:#7c6aef;color:#fff;}
.result-banner{background:linear-gradient(135deg,#7c6aef22,#4ade8022);border:1px solid #7c6aef44;border-radius:12px;padding:20px 24px;margin-top:16px;text-align:center;}
.result-banner .value{font-size:28px;font-weight:700;color:#4ade80;}
.result-banner .label{font-size:12px;color:#888;margin-top:4px;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px;}
.info-item{background:#0f0f14;border-radius:8px;padding:14px;border:1px solid #2a2a3a;}
.info-item .il{font-size:11px;color:#888;text-transform:uppercase;}
.info-item .iv{font-size:18px;font-weight:600;color:#e0e0e8;margin-top:4px;}
.clock-bar{background:#0f0f14;border:1px solid #2a2a3a;border-radius:8px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.clock-time{font-size:20px;font-weight:700;color:#4ade80;font-family:monospace;}
.toggle{display:flex;gap:4px;background:#1a1a25;border-radius:6px;padding:2px;}
.toggle button{padding:4px 12px;border:none;border-radius:4px;cursor:pointer;font-size:12px;background:transparent;color:#888;transition:all .2s;}
.toggle button.active{background:#7c6aef;color:#fff;}
.tz-panels{display:flex;gap:20px;flex-wrap:wrap;}
.tz-panel{flex:1;min-width:280px;background:#0f0f14;border:1px solid #2a2a3a;border-radius:12px;padding:20px;}
.tz-panel .big-time{font-size:36px;font-weight:700;text-align:center;margin:16px 0;font-family:monospace;color:#e0e0e8;}
.tz-panel .big-date{text-align:center;font-size:13px;color:#888;margin-bottom:12px;}
.diff-badge{text-align:center;padding:12px;font-size:14px;color:#7c6aef;background:#7c6aef11;border-radius:8px;margin-top:16px;border:1px solid #7c6aef33;}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:90;}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);}
.sidebar.open{transform:translateX(0);}
.hamburger{display:block;}
.main{margin-left:0;}
#content{padding:16px;}
.topbar{padding:12px 16px;}
.overlay.show{display:block;}
}
</style>
</head>

const TZ_LIST=[
{label:'UTC-10 (HST)',off:-600},{label:'UTC-9 (AKST)',off:-540},{label:'UTC-8 (PST)',off:-480},
{label:'UTC-7 (MST)',off:-420},{label:'UTC-6 (CST)',off:-360},{label:'UTC-5 (EST)',off:-300},

const Tools = {};

// ===== 1. UNIT CONVERTER =====
Tools.converter = {
  cat:'Length',
  units:{
    Length:{m:1,km:1000,cm:0.01,mm:0.001,mi:1609.344,yd:0.9144,ft:0.3048,in:0.0254},
    Weight:{kg:1,g:0.001,mg:0.000001,lb:0.453592,oz:0.0283495,t:1000},
    Temp:{C:'C',F:'F',K:'K'},
    Volume:{L:1,mL:0.001,m3:1000,gal_us:3.78541,gal_uk:4.54609,ft3:28.3168,bbl:158.987},
    Speed:{m_s:1,km_h:0.277778,ft_s:0.3048,knot:0.514444,mph:0.44704},
    Data:{B:1,KB:1024,MB:1048576,GB:1073741824,TB:1099511627776},
    Time:{s:1,min:60,hr:3600,day:86400,wk:604800},
    Area:{m2:1,km2:1000000,cm2:0.0001,ha:10000,acre:4046.86,ft2:0.092903,in2:0.00064516}
  },
  convert(cat,v,from,to){
    if(cat==='Temp'){return this.convertTemp(v,from,to);}
    const u=this.units[cat];
    return v*u[from]/u[to];
  },
  convertTemp(v,f,t){
    let c;
    if(f==='C')c=v;else if(f==='F')c=(v-32)*5/9;else c=v-273.15;
    if(t==='C')return c;if(t==='F')return c*9/5+32;return c+273.15;
  },
  render(){
    const cats=Object.keys(this.units);
    let h=`<div class="card"><div class="tabs" id="uc-tabs">${cats.map(c=>`<div class="tab ${c===this.cat?'active':''}" onclick="Tools.converter.setCat('${c}')">${c}</div>`).join('')}</div>`;
    const units=Object.keys(this.units[this.cat]);
    h+=`<div class="row">
      <div class="field"><label>From</label><select id="uc-from" onchange="Tools.converter.calc()">${units.map(u=>`<option value="${u}">${u}</option>`).join('')}</select></div>
      <div class="field" style="flex:2"><label>Value</label><input type="number" id="uc-val" value="1" oninput="Tools.converter.calc()" step="any"></div>
      <button class="swap-btn" onclick="Tools.converter.swap()">⇄</button>
      <div class="field"><label>To</label><select id="uc-to" onchange="Tools.converter.calc()">${units.map((u,i)=>`<option value="${u}" ${i===1?'selected':''}>${u}</option>`).join('')}</select></div>
    </div></div>
    <div class="result-banner" id="uc-result"><div class="value">1 ${units[0]} = 1 ${units[0]}</div><div class="label">Select units to convert</div></div>`;
    document.getElementById('content').innerHTML=h;
    this.calc();
  },
  setCat(c){this.cat=c;this.render();},
  swap(){
    const f=document.getElementById('uc-from'),t=document.getElementById('uc-to');
    const tmp=f.value;f.value=t.value;t.value=tmp;this.calc();
  },
  calc(){
    const v=parseFloat(document.getElementById('uc-val').value)||0;
    const from=document.getElementById('uc-from').value;
    const to=document.getElementById('uc-to').value;
    const r=this.convert(this.cat,v,from,to);
    document.getElementById('uc-result').innerHTML=`<div class="value">${v} ${from} = ${this.fmt(r)} ${to}</div><div class="label">Real-time conversion</div>`;
  },
  fmt(n){return Number.isInteger(n)?n.toString():n.toPrecision(8).replace(/\.?0+$/,'');}
};

// ===== 2. TIME ZONE =====
Tools.timezone = {
  mode:'24H',fromIdx:20,toIdx:10,interval:null,inputTime:null,
  render(){
    clearInterval(this.interval);
    let h=`<div class="card"><div class="clock-bar"><div class="clock-time" id="tz-clock"></div>
      <div class="toggle"><button class="${this.mode==='24H'?'active':''}" onclick="Tools.timezone.setMode('24H')">24H</button><button class="${this.mode==='12H'?'active':''}" onclick="Tools.timezone.setMode('12H')">12H</button></div></div>
      <div class="row"><div class="field"><label>Custom Time Input (optional)</label><input type="time" id="tz-input" onchange="Tools.timezone.setInput(this.value)" step="1"></div></div>
      <div class="tz-panels">
        <div class="tz-panel"><div style="font-size:12px;color:#7c6aef;font-weight:600;margin-bottom:8px">FROM</div>
          <select id="tz-from" onchange="Tools.timezone.update()" style="width:100%;padding:8px;background:#0f0f14;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e8;margin-bottom:12px">
          ${TZ_LIST.map((z,i)=>`<option value="${i}" ${i===this.fromIdx?'selected':''}>${z.label}</option>`).join('')}</select>
          <div class="big-date" id="tz-from-date"></div><div class="big-time" id="tz-from-time"></div></div>
        <div class="tz-panel"><div style="font-size:12px;color:#4ade80;font-weight:600;margin-bottom:8px">TO</div>
          <select id="tz-to" onchange="Tools.timezone.update()" style="width:100%;padding:8px;background:#0f0f14;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e8;margin-bottom:12px">
          ${TZ_LIST.map((z,i)=>`<option value="${i}" ${i===this.toIdx?'selected':''}>${z.label}</option>`).join('')}</select>
          <div class="big-date" id="tz-to-date"></div><div class="big-time" id="tz-to-time"></div></div>
      </div>
      <div class="diff-badge" id="tz-diff"></div></div>`;
    document.getElementById('content').innerHTML=h;
    this.update();
    this.interval=setInterval(()=>this.update(),1000);
  },
  setMode(m){this.mode=m;this.render();},
  setInput(v){this.inputTime=v;this.update();},
  fmtTime(d){
    let h=d.getUTCHours(),m=d.getUTCMinutes(),s=d.getUTCSeconds();
    if(this.mode==='12H'){
      const ap=h>=12?'PM':'AM';h=h%12||12;
      return`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ap}`;
    }
    return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },
  update(){
    const now=new Date();
    let base;
    if(this.inputTime){
      const[hh,mm,ss]=this.inputTime.split(':').map(Number);
      base=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),hh,mm,ss||0));
      base.setUTCHours(base.getUTCHours()-TZ_LIST[this.fromIdx].off/60);
    } else {
      base=new Date(now.getTime()-now.getTimezoneOffset()*60000);
    }
    const fromOff=TZ_LIST[this.fromIdx].off*60000;
    const toOff=TZ_LIST[this.toIdx].off*60000;
    const fromD=new Date(base.getTime()+fromOff+now.getTimezoneOffset()*60000);
    const toD=new Date(base.getTime()+toOff+now.getTimezoneOffset()*60000);
    const opts={weekday:'short',year:'numeric',month:'short',day:'numeric'};
    document.getElementById('tz-clock').textContent=`⏰ ${this.fmtTime(now.toISOString?new Date():new Date())}`;
    document.getElementById('tz-from-date').textContent=fromD.toLocaleDateString('en-US',opts);
    document.getElementById('tz-from-time').textContent=this.fmtTime(fromD);
    document.getElementById('tz-to-date').textContent=toD.toLocaleDateString('en-US',opts);
    document.getElementById('tz-to-time').textContent=this.fmtTime(toD);
    const diff=(TZ_LIST[this.toIdx].off-TZ_LIST[this.fromIdx].off)/60;
    const sign=diff>=0?'+':'';
    document.getElementById('tz-diff').innerHTML=`Time difference: <strong>${sign}${diff} hour${diff!==1?'s':''}</strong> | ${TZ_LIST[this.fromIdx].label} → ${TZ_LIST[this.toIdx].label}`;
  }
};

// ===== 3. PIPE CALCULATOR =====
Tools.pipe = {

    const toIn=mm=>(mm/25.4).toFixed(3);

    document.getElementById('p-result').innerHTML=`
      <div class="card-title">NPS ${this.nps}" — Sch ${this.sche}</div>
      <div class="info-grid">
        <div class="info-item"><div class="il">Outer Diameter</div><div class="iv">${od_mm} mm <span style="font-size:12px;color:#888">(${toIn(od_mm)}")</span></div></div>
        <div class="info-item"><div class="il">Wall Thickness</div><div class="iv">${t_mm} mm <span style="font-size:12px;color:#888">(${toIn(t_mm)}")</span></div></div>
        <div class="info-item"><div class="il">Inner Diameter</div><div class="iv">${id_mm.toFixed(1)} mm <span style="font-size:12px;color:#888">(${toIn(id_mm)}")</span></div></div>
        <div class="info-item"><div class="il">Weight</div><div class="iv">${weight_kg.toFixed(2)} kg/m <span style="font-size:12px;color:#888">(${toLb(weight_kg)} lb/ft)</span></div></div>
      </div>`;
  }
};

// ===== 4. PRESSURE & FLOW =====
Tools.pressflow = {
  tab:'pressure',
  pFrom:'PSI',pTo:'Bar',fFrom:'BPD',fTo:'m3h',
  pUnits:{PSI:1,Bar:14.5038,kPa:0.145038,MPa:145.038,kgcm2:14.2233,atm:14.6959,mmHg:0.0193368,inHg:0.491154},
  fUnits:{BPD:1,m3h:15.915,Lmin:0.0225427,GPM_US:0.0238095,GPM_UK:0.019985,CFM:0.000981064},
  convert(val,unitMap,from,to){return val/unitMap[from]*unitMap[to];},
  render(){
    let h=`<div class="card"><div class="tabs">
      <div class="tab ${this.tab==='pressure'?'active':''}" onclick="Tools.pressflow.setTab('pressure')">Pressure</div>
      <div class="tab ${this.tab==='flow'?'active':''}" onclick="Tools.pressflow.setTab('flow')">Flow Rate</div></div>`;
    if(this.tab==='pressure'){
      const u=Object.keys(this.pUnits);
      h+=`<div class="row">
        <div class="field"><label>From</label><select id="pf-from" onchange="Tools.pressflow.pFrom=this.value;Tools.pressflow.calcP()">${u.map(x=>`<option value="${x}" ${x===this.pFrom?'selected':''}>${x}</option>`).join('')}</select></div>
        <div class="field" style="flex:2"><label>Value</label><input type="number" id="pf-val" value="1" oninput="Tools.pressflow.calcP()" step="any"></div>
        <button class="swap-btn" onclick="Tools.pressflow.swapP()">⇄</button>
        <div class="field"><label>To</label><select id="pf-to" onchange="Tools.pressflow.pTo=this.value;Tools.pressflow.calcP()">${u.map(x=>`<option value="${x}" ${x===this.pTo?'selected':''}>${x}</option>`).join('')}</select></div>
      </div></div><div class="result-banner" id="pf-result"></div>`;
    } else {
      const u=Object.keys(this.fUnits);
      h+=`<div class="row">
        <div class="field"><label>From</label><select id="ff-from" onchange="Tools.pressflow.fFrom=this.value;Tools.pressflow.calcF()">${u.map(x=>`<option value="${x}" ${x===this.fFrom?'selected':''}>${x}</option>`).join('')}</select></div>
        <div class="field" style="flex:2"><label>Value</label><input type="number" id="ff-val" value="1" oninput="Tools.pressflow.calcF()" step="any"></div>
        <button class="swap-btn" onclick="Tools.pressflow.swapF()">⇄</button>
        <div class="field"><label>To</label><select id="ff-to" onchange="Tools.pressflow.fTo=this.value;Tools.pressflow.calcF()">${u.map(x=>`<option value="${x}" ${x===this.fTo?'selected':''}>${x}</option>`).join('')}</select></div>
      </div></div><div class="result-banner" id="ff-result"></div>`;
    }
    document.getElementById('content').innerHTML=h;
    this.tab==='pressure'?this.calcP():this.calcF();
  },
  setTab(t){this.tab=t;this.render();},
  calcP(){const v=parseFloat(document.getElementById('pf-val').value)||0;const r=this.convert(v,this.pUnits,this.pFrom,this.pTo);document.getElementById('pf-result').innerHTML=`<div class="value">${v} ${this.pFrom} = ${r.toPrecision(8).replace(/\.?0+$/,'')} ${this.pTo}</div>`;},
  calcF(){const v=parseFloat(document.getElementById('ff-val').value)||0;const r=this.convert(v,this.fUnits,this.fFrom,this.fTo);document.getElementById('ff-result').innerHTML=`<div class="value">${v} ${this.fFrom} = ${r.toPrecision(8).replace(/\.?0+$/,'')} ${this.fTo}</div>`;},
  swapP(){let t=this.pFrom;this.pFrom=this.pTo;this.pTo=t;this.render();},
  swapF(){let t=this.fFrom;this.fFrom=this.fTo;this.fTo=t;this.render();}
};

      <div class="row">

// ===== 6. COORDINATE CONVERTER =====
Tools.coord = {
  tab:'utm2ll',
  render(){
    let h=`<div class="card"><div class="tabs">
      <div class="tab ${this.tab==='utm2ll'?'active':''}" onclick="Tools.coord.setTab('utm2ll')">UTM → Lat/Long</div>
      <div class="tab ${this.tab==='ll2utm'?'active':''}" onclick="Tools.coord.setTab('ll2utm')">Lat/Long → UTM</div></div>`;
    if(this.tab==='utm2ll'){
      h+=`<div class="row">
        <div class="field"><label>Zone (1-60)</label><select id="cz-zone">${Array.from({length:60},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('')}</select></div>
        <div class="field"><label>Hemisphere</label><select id="cz-hemi"><option value="N">North</option><option value="S">South</option></select></div>
        <div class="field"><label>Easting (m)</label><input type="number" id="cz-east" value="500000" step="any"></div>
        <div class="field"><label>Northing (m)</label><input type="number" id="cz-north" value="0" step="any"></div>
        <button class="swap-btn" onclick="Tools.coord.utm2ll()">→</button>
      </div></div><div class="result-banner" id="cz-result"></div>`;
    } else {
      h+=`<div class="row">
        <div class="field"><label>Latitude (°)</label><input type="number" id="cl-lat" value="0" step="any"></div>
        <div class="field"><label>Longitude (°)</label><input type="number" id="cl-lon" value="106" step="any"></div>
        <button class="swap-btn" onclick="Tools.coord.ll2utm()">→</button>
      </div></div><div class="result-banner" id="cl-result"></div>`;
    }
    document.getElementById('content').innerHTML=h;
  },
  setTab(t){this.tab=t;this.render();},
  utm2ll(){
    const zone=+document.getElementById('cz-zone').value;
    const hemi=document.getElementById('cz-hemi').value;
    const E=+document.getElementById('cz-east').value;
    const N=+document.getElementById('cz-north').value;
    const a=6378137,f=1/298.257223563,b=a*(1-f),e2=2*f-f*f,e2p=e2/(1-e2),k0=0.9996;
    const ep2=e2p;
    const M0=hemi==='N'?0:10000000;
    const M=M0+(hemi==='N'?N:-N);
    const mu=M/(a*k0);
    const e1=(1-Math.sqrt(1-e2))/(1+Math.sqrt(1-e2));
    const phi1=mu+e1*(3/2-27/32*e1*e1)*Math.sin(2*mu)+e1*e1*(21/16-55/32*e1*e1)*Math.sin(4*mu)+e1*e1*e1*(151/96)*Math.sin(6*mu);
    const N1=a/Math.sqrt(1-e2*Math.sin(phi1)*Math.sin(phi1));
    const T1=Math.tan(phi1)*Math.tan(phi1);
    const C1=ep2*Math.cos(phi1)*Math.cos(phi1);
    const R1=a*(1-e2)/Math.pow(1-e2*Math.sin(phi1)*Math.sin(phi1),1.5);
    const D=(E-500000)/(N1*k0);
    const lat=phi1-(N1*Math.tan(phi1)/R1)*(D*D/2-(5+3*T1+10*C1-4*ep2)*D*D*D*D/24+(61+90*T1+298*C1+45*T1*T1)*D*D*D*D*D*D/720);
    const lon=(zone*6-183)*Math.PI/180+(D-(1+2*T1+C1)*D*D*D/6+(5-2*C1+28*T1-3*ep2+8*C1*C1+24*T1*T1)*D*D*D*D*D/120)/Math.cos(phi1);
    const latD=lat*180/Math.PI,lonD=lon*180/Math.PI;
    document.getElementById('cz-result').innerHTML=`<div class="value">${latD.toFixed(6)}° ${hemi}, ${lonD.toFixed(6)}°</div><div class="label">UTM Zone ${zone}${hemi} (${E}, ${N}) → Latitude, Longitude</div>`;
  },
  ll2utm(){
    const lat=+document.getElementById('cl-lat').value*Math.PI/180;
    const lon=+document.getElementById('cl-lon').value*Math.PI/180;
    const a=6378137,f=1/298.257223563,b=a*(1-f),e2=2*f-f*f,k0=0.9996;
    const zone=Math.floor((+document.getElementById('cl-lon').value+180)/6)+1;
    const lon0=(zone*6-183)*Math.PI/180;
    const ep2=e2/(1-e2);
    const N=a/Math.sqrt(1-e2*Math.sin(lat)*Math.sin(lat));
    const T=Math.tan(lat)*Math.tan(lat);
    const C=ep2*Math.cos(lat)*Math.cos(lat);
    const A=(lon-lon0)*Math.cos(lat);
    const M=a*((1-e2/4-3*e2*e2/64)*lat-(3*e2/8+3*e2*e2/32)*Math.sin(2*lat)+(15*e2*e2/256)*Math.sin(4*lat));
    const easting=500000+k0*N*(A+(1-T+C)*A*A*A/6+(5-18*T+T*T+72*C-58*ep2)*A*A*A*A*A/120);
    const northing=k0*(M+N*Math.tan(lat)*(A*A/2+(5-T+9*C+4*C*C)*A*A*A*A/24+(61-58*T+T*T+600*C-330*ep2)*A*A*A*A*A*A/720));
    const hemi=northing>=0?'N':'S';
    document.getElementById('cl-result').innerHTML=`<div class="value">Zone ${zone}${hemi} — E: ${easting.toFixed(1)} m — N: ${Math.abs(northing).toFixed(1)} m</div><div class="label">Lat ${+document.getElementById('cl-lat').value}°, Lon ${+document.getElementById('cl-lon').value}° → UTM</div>`;
  }
};

// ===== PLATFORM ENGINE =====
const TOOL_LIST=[
  {key:'converter',name:'Unit Converter',icon:'📐'},
  {key:'timezone',name:'Time Zone',icon:'🌍'},
  {key:'pipe',name:'Pipe Calculator',icon:'🔩'},
  {key:'pressflow',name:'Pressure & Flow',icon:'📊'},
  {key:'flange',name:'Flange Dimensions',icon:'🔧'},
  {key:'coord',name:'Coordinate Converter',icon:'🗺️'}
];
let currentTool='converter';

function renderTool(){
  document.getElementById('content').innerHTML='';
  Tools[currentTool].render();
}
function switchTool(key){
  currentTool=key;
  document.getElementById('pageTitle').textContent=TOOL_LIST.find(t=>t.key===key).name;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.key===key));
  renderTool();
  if(window.innerWidth<=768)toggleSidebar();
}
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function initNav(){
  document.getElementById('nav').innerHTML=TOOL_LIST.map(t=>
    `<div class="nav-item" data-key="${t.key}" onclick="switchTool('${t.key}')"><span class="icon">${t.icon}</span>${t.name}</div>`
  ).join('');
}
initNav();renderTool();
</script>
